<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>T-F 翻译器 · 翻译潜台词</title>
<style>
  :root{
    --bg:#faf9f6; --card:#ffffff; --ink:#23211c; --muted:#76746c;
    --line:#e9e6dd; --f:#c2557a; --fbg:#fbeaf0; --t:#3b8a6b; --tbg:#e3f3ec;
    --accent:#6b5fd0; --accentbg:#eeebfb; --danger:#c0392b;
    --radius:16px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.65; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:600px; margin:0 auto; padding:24px 18px 64px}
  header{text-align:center; margin:8px 0 22px}
  h1{font-size:23px; margin:0 0 4px; font-weight:650}
  .sub{color:var(--muted); font-size:14px; margin:0}
  .tabs{display:flex; gap:8px; background:#efece4; padding:5px; border-radius:13px; margin-bottom:20px}
  .tab{flex:1; text-align:center; padding:9px 0; border-radius:9px; font-size:15px; cursor:pointer; color:var(--muted); user-select:none; transition:.15s}
  .tab.on{background:var(--card); color:var(--ink); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.06)}
  textarea,input{
    width:100%; border:1px solid var(--line); border-radius:12px; padding:13px 14px;
    font:inherit; color:var(--ink); background:var(--card); resize:vertical; outline:none;
  }
  textarea:focus,input:focus{border-color:var(--accent)}
  .picker{display:flex; align-items:center; gap:10px; margin-bottom:10px}
  .pk-label{font-size:13.5px; color:var(--muted); min-width:44px}
  .seg{display:flex; gap:6px; flex-wrap:wrap}
  .seg button{border:1px solid var(--line); background:var(--card); color:var(--muted); font:inherit; font-size:13.5px; padding:6px 12px; border-radius:20px; cursor:pointer; transition:.15s}
  .seg button.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  .hint{font-size:12.5px; color:var(--muted); margin:6px 2px 0}
  button.go{
    width:100%; margin-top:12px; padding:13px; border:none; border-radius:12px;
    background:var(--ink); color:#fff; font-size:15.5px; font-weight:600; cursor:pointer; transition:.15s;
  }
  button.go:hover{opacity:.9}
  button.go:disabled{opacity:.5; cursor:default}
  .ghost{background:var(--card); color:var(--ink); border:1px solid var(--line)}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px 18px 16px; margin-top:16px; animation:rise .25s ease}
  @keyframes rise{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
  .leanpill{display:inline-block; font-size:12.5px; font-weight:600; padding:3px 11px; border-radius:20px; margin-bottom:12px}
  .lean-F{background:var(--fbg); color:var(--f)}
  .lean-T{background:var(--tbg); color:var(--t)}
  .row{margin:11px 0}
  .lbl{font-size:12.5px; color:var(--muted); margin-bottom:2px; letter-spacing:.02em}
  .val{font-size:15.5px}
  .reply{background:#f7f5ef; border-radius:11px; padding:11px 13px; margin-top:8px}
  .reply .tone{font-size:12px; color:var(--accent); font-weight:600; margin-bottom:3px}
  .quote{font-size:18px; font-weight:600; margin:2px 0 4px; line-height:1.5}
  .scenario{color:var(--muted); font-size:14px; margin-bottom:8px}
  .stars{font-size:22px; letter-spacing:3px}
  .streak{text-align:center; font-size:14px; color:var(--muted); margin-top:14px}
  .err{color:var(--danger); font-size:14px; margin-top:12px}
  .spin{display:inline-block; width:15px; height:15px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .foot{text-align:center; color:#b3b0a6; font-size:12px; margin-top:34px; line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>T-F 翻译器</h1>
    <p class="sub">嘴上一套，心里一套。ta 那句话到底啥意思，丢进来我给你翻。</p>
  </header>

  <div class="tabs">
    <div class="tab on" data-tab="translate">翻译潜台词</div>
    <div class="tab" data-tab="game">练手·猜心思</div>
  </div>

  <!-- 翻译模式 -->
  <section id="translate">
    <div class="picker">
      <span class="pk-label">对方是</span>
      <div class="seg" id="segOther">
        <button data-v="F" class="on">F·走心</button>
        <button data-v="T">T·走脑</button>
        <button data-v="">不知道</button>
      </div>
    </div>
    <div class="picker">
      <span class="pk-label">我是</span>
      <div class="seg" id="segSelf">
        <button data-v="T">T·走脑</button>
        <button data-v="F">F·走心</button>
        <button data-v="" class="on">不知道</button>
      </div>
    </div>
    <textarea id="msg" rows="3" placeholder="ta 那句让你血压飙升的话，粘这儿，比如：算了，没事。"></textarea>
    <input id="ctx" placeholder="(选填) 谁说的、啥情况，比如：对象、刚加完班回来" style="margin-top:10px" />
    <p class="hint">选了类型就照这个翻；选"不知道"就丢给它替你判断。</p>
    <button class="go" id="tBtn">翻！</button>
    <div id="tOut"></div>
  </section>

  <!-- 练习模式 -->
  <section id="game" style="display:none">
    <div id="gStart">
      <button class="go" id="newQ">来一题</button>
      <p class="hint" style="text-align:center">先猜 ta 到底想干嘛、你会咋回，再翻牌看分。刷着刷着你就成人间清醒了。</p>
    </div>
    <div id="gQuestion" style="display:none">
      <div class="card">
        <div class="scenario" id="qScenario"></div>
        <div class="quote" id="qMsg"></div>
      </div>
      <textarea id="guess" rows="3" placeholder="ta 到底想要啥？换你会咋回？" style="margin-top:14px"></textarea>
      <button class="go" id="submitG">翻牌看答案</button>
    </div>
    <div id="gResult"></div>
    <div class="streak" id="streak"></div>
  </section>

  <p class="foot">别急着贴标签。<br/>ta 不是不在乎，只是说的和想的没走同一条线。</p>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let streak = +(localStorage.getItem("tf_streak")||0);
let cur = null; // current question
let otherType = "F", selfType = "";

function renderStreak(){
  $("#streak").textContent = streak > 0 ? `🔥 连对 ${streak} 题，读心小天才` : "";
}
renderStreak();

// segmented pickers
function bindSeg(id, setter){
  const box = $("#"+id);
  box.querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{
      box.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      setter(b.dataset.v);
    };
  });
}
bindSeg("segOther", v => otherType = v);
bindSeg("segSelf", v => selfType = v);

// tabs
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
    t.classList.add("on");
    const k=t.dataset.tab;
    $("#translate").style.display = k==="translate"?"block":"none";
    $("#game").style.display = k==="game"?"block":"none";
  };
});

async function call(mode, input){
  const r = await fetch("/api/chat", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({mode, input})
  });
  const data = await r.json();
  if(!r.ok || data.error) throw new Error(data.error || "出错了");
  return data;
}
function loading(btn, label){ btn.disabled=true; btn.dataset.txt=btn.textContent; btn.innerHTML=`<span class="spin"></span>${label}`; }
function unload(btn){ btn.disabled=false; btn.textContent=btn.dataset.txt; }

// ---- translate ----
$("#tBtn").onclick = async ()=>{
  const message = $("#msg").value.trim();
  if(!message){ $("#msg").focus(); return; }
  const btn=$("#tBtn"); loading(btn,"破译中…"); $("#tOut").innerHTML="";
  try{
    const d = await call("translate", {message, context:$("#ctx").value.trim(), otherType, selfType});
    const replies = (d.replies||[]).map(rp=>`
      <div class="reply"><div class="tone">${esc(rp.tone)}</div>${esc(rp.text)}</div>`).join("");
    $("#tOut").innerHTML = `
      <div class="card">
        <span class="leanpill lean-${d.lean}">${d.lean==='F'?'这句偏 F·走心':'这句偏 T·走脑'}</span>
        <div class="row"><div class="lbl">字面上像在说</div><div class="val">${esc(d.surface)}</div></div>
        <div class="row"><div class="lbl">潜台词其实是</div><div class="val">${esc(d.meaning)}</div></div>
        <div class="row"><div class="lbl">ta 其实想要</div><div class="val">${esc(d.need)}</div></div>
        ${d.landmine?`<div class="row"><div class="lbl">⚠️ 别踩的雷</div><div class="val">${esc(d.landmine)}</div></div>`:""}
        <div class="row"><div class="lbl">可以这么回</div>${replies}</div>
        ${d.flip?`<div class="row"><div class="lbl">想让 ta 更懂你，可以说</div><div class="val">${esc(d.flip)}</div></div>`:""}
      </div>`;
  }catch(e){ $("#tOut").innerHTML=`<div class="err">${esc(e.message)}</div>`; }
  unload(btn);
};

// ---- game ----
$("#newQ").onclick = async ()=>{
  const btn=$("#newQ"); loading(btn,"抽题中…"); $("#gResult").innerHTML="";
  try{
    cur = await call("question", {});
    $("#qScenario").textContent = cur.scenario;
    $("#qMsg").textContent = "「" + cur.message + "」";
    $("#guess").value="";
    $("#gStart").style.display="none";
    $("#gQuestion").style.display="block";
  }catch(e){ $("#gResult").innerHTML=`<div class="err">${esc(e.message)}</div>`; }
  unload(btn);
};

$("#submitG").onclick = async ()=>{
  const guess = $("#guess").value.trim();
  if(!guess){ $("#guess").focus(); return; }
  const btn=$("#submitG"); loading(btn,"对答案中…");
  try{
    const d = await call("score", {scenario:cur.scenario, message:cur.message, guess});
    const stars = "★".repeat(d.stars||0) + "☆".repeat(3-(d.stars||0));
    if((d.stars||0) >= 2){ streak++; } else { streak = 0; }
    localStorage.setItem("tf_streak", streak);
    $("#gResult").innerHTML = `
      <div class="card">
        <div class="stars" style="color:var(--accent)">${stars}</div>
        <div class="row"><div class="val">${esc(d.verdict)}</div></div>
        ${d.hit?`<div class="row"><div class="lbl">猜中了</div><div class="val">${esc(d.hit)}</div></div>`:""}
        ${d.miss?`<div class="row"><div class="lbl">差一点点</div><div class="val">${esc(d.miss)}</div></div>`:""}
        <div class="row"><div class="lbl">参考潜台词</div><div class="val">${esc(d.meaning)}</div></div>
        <div class="row"><div class="lbl">ta 其实想要</div><div class="val">${esc(d.need)}</div></div>
        <div class="row"><div class="lbl">可以这么回</div><div class="reply">${esc(d.reply)}</div></div>
        <button class="go ghost" id="again" style="margin-top:14px">再来一题</button>
      </div>`;
    $("#gQuestion").style.display="none";
    $("#gStart").style.display="block";
    $("#newQ").textContent="来一题";
    renderStreak();
    $("#again").onclick=()=>{ $("#gResult").innerHTML=""; $("#newQ").click(); };
  }catch(e){ $("#gResult").innerHTML=`<div class="err">${esc(e.message)}</div>`; }
  unload(btn);
};
</script>
</body>
</html>
